<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영등포구 지번 검색 구역계 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; }
        #header { padding: 15px; background-color: #f8f9fa; border-bottom: 1px solid #ddd; }
        #search-box { padding: 8px; font-size: 16px; width: 200px; }
        #search-btn { padding: 8px 15px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        #map { width: 100%; height: calc(100vh - 70px); }
    </style>
</head>
<body>

<div id="header">
    <input type="text" id="search-box" placeholder="예: 123-4대">
    <button id="search-btn">검색</button>
</div>

<div id="map"></div>

<script>
    // 1. 배경 지도 생성 (초기 중심좌표: 영등포구, 줌 레벨: 13)
    var map = L.map('map').setView([37.5263, 126.8962], 13);

    // 오픈스트리트맵 타일 깔기
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var geoJsonLayer; 
    var allData; 

    // 2. QGIS에서 4326 좌표계로 뽑아낸 데이터 불러오기
    fetch('영등포구.geojson') 
        .then(response => response.json())
        .then(data => {
            allData = data;
            console.log("✅ 데이터 로드 완료! 총 폴리곤 수:", data.features.length);
        })
        .catch(error => console.error('데이터를 불러오지 못했습니다:', error));

    // 3. 검색 버튼 클릭 시 동작할 기능
    document.getElementById('search-btn').addEventListener('click', function() {
        var searchJibun = document.getElementById('search-box').value.trim();

        if (!allData) {
            alert("아직 데이터를 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
            return;
        }

        // 입력한 지번과 일치하는 데이터 찾기 (띄어쓰기 없이 정확히 일치해야 함)
        var foundFeature = allData.features.find(function(feature) {
            return feature.properties.JIBUN === searchJibun;
        });

        if (foundFeature) {
            // 기존에 그려진 테두리가 있다면 지우기
            if (geoJsonLayer) {
                map.removeLayer(geoJsonLayer);
            }

            // 찾은 구역계를 지도에 빨간색으로 그리기
            geoJsonLayer = L.geoJSON(foundFeature, {
                style: { color: 'red', weight: 3, fillColor: '#ff3333', fillOpacity: 0.5 }
            }).addTo(map);

            // 해당 위치로 화면 줌 인!
            map.fitBounds(geoJsonLayer.getBounds());
        } else {
            alert("해당 지번을 찾을 수 없습니다. (띄어쓰기가 없는지 확인해주세요!)");
        }
    });
</script>
</body>
</html>
