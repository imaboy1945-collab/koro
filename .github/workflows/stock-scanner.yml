name: Stock Telegram Scanner

on:
  schedule:
    # KST 15:45 = UTC 06:45, Monday-Friday
    - cron: "45 6 * * 1-5"
  workflow_dispatch:
    inputs:
      market:
        description: "실행 시장"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - kospi
          - kosdaq
      min_score:
        description: "전송 최소 점수"
        required: false
        default: "50"
      top_n:
        description: "시장별 최대 전송 종목 수"
        required: false
        default: "10"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MARKET: ${{ github.event.inputs.market || 'all' }}
          MIN_SCORE: ${{ github.event.inputs.min_score || '50' }}
          TOP_N: ${{ github.event.inputs.top_n || '10' }}
          BLOG_URL: "https://bestwellth.org"
        run: python stock_scanner.py
