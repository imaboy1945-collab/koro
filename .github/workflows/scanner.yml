name: KOSDAQ Breakout Scanner

on:
  schedule:
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v3
      
    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install finance-datareader requests
        
    - name: KOSDAQ 돌파매매 스캐너 실행
      env:
        # Secrets 이름에 정확히 맞춰서 환경변수 세팅
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python "kosdaq line.py"
