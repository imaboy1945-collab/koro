name: Quant Scanner Autopilot

on:
  schedule:
    # 월~금, 한국 시간 오전 9시~오후 3시 (UTC 00:00~06:00) 매시간 정각 실행
    - cron: '0 0,1,2,3,4,5,6 * * 1-5'
  workflow_dispatch: # 직접 실행해보고 싶을 때 사용하는 버튼

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas numpy yfinance requests pykrx

      - name: Run Scanners
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python kospi_scanner_v3_1.py
          python kosdaq_scanner_v3_1.py
